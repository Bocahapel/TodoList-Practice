<div class="h-full w-64 bg-sidebar rounded-2xl shadow-sm flex flex-col p-4 gap-4">
  <!-- Search -->
  <div class="relative w-full">
    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
      <i class="bi bi-search text-gray-400 text-sm"></i>
    </div>

    <input
      type="text"
      placeholder="Search"
      class="block w-full rounded-xl border-0 bg-white py-1.5 pl-10 pr-3 text-gray-900 shadow-sm ring-1 ring-inset ring-transparent placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-gray-200 sm:text-sm sm:leading-6"
    />
  </div>
  <!-- Section -->
  <div class="text-xs font-semibold text-neutral-500 uppercase tracking-wide">Tasks</div>

  <!-- Filters -->
  <div class="flex flex-col gap-1">
    <app-task-filter
      label="Today Tasks"
      icon="bi-list-task"
      [active]="state.activeView() === 'today'"
      (filterClick)="state.activeView.set('today')"
    />

    <app-task-filter
      label="All Tasks"
      icon="bi-calendar-check"
      [active]="state.activeView() === 'all'"
      (filterClick)="state.activeView.set('all')"
    />
  </div>
</div>
