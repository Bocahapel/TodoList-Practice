<div class="h-full w-64 bg-sidebar rounded-2xl shadow-sm flex flex-col p-4 gap-4">
  <!-- Search -->

  <!-- Section -->
  <div class="text-xs font-semibold text-neutral-500 uppercase tracking-wide">Tasks</div>

  <!-- Filters -->
  <div class="flex flex-col gap-1">
    <app-task-filter
      label="Today Tasks"
      icon="bi-list-task"
      [active]="activeFilter() === 'today'"
      (filterClick)="activeFilter.set('today')"
    />

    <app-task-filter
      label="Future Tasks"
      icon="bi-calendar-check"
      [active]="activeFilter() === 'future'"
      (filterClick)="activeFilter.set('future')"
    />
  </div>
</div>
