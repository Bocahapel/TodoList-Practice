<div
  (click)="onClick()"
  class="flex items-center gap-3 px-3 py-2 rounded-lg cursor-pointer transition-colors"
  [ngClass]="active() ? 'bg-slate-600 text-white' : 'text-neutral-700 hover:bg-neutral-200'"
>
  <i class="bi w-5 h-5 flex items-center justify-center text-lg" [ngClass]="icon()"></i>
  <span class="text-sm font-medium">{{ label() }}</span>
</div>
