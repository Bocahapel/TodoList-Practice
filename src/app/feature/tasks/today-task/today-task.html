<div class="flex flex-col tracking-tight">
  <span class="text-3xl font-bold text-black">
    {{ formattedDate() }}
  </span>

  <span class="text-xl font-medium text-gray-800 capitalize">
    {{ dayName() }}
  </span>
</div>

<div class="mt-8 mb-2">
  <button
    class="flex items-center gap-2 text-green-600 hover:text-green-700 font-medium transition-colors"
    (click)="onAddNew()"
  >
    <i class="bi bi-clipboard-plus text-base"></i>
    <span class="text-sm"> Add New Task</span>
  </button>
</div>

<hr class="border-gray-400 mb-4" />
@for (item of tasks(); track item.id) {
  <button
    (click)="viewDetail(item)"
    [class.hover:bg-task-hover]="selectedTask()?.id !== item.id"
    [class.bg-task-active]="selectedTask()?.id === item.id"
    [class.text-white]="selectedTask()?.id === item.id"
    class="w-full text-left p-4 rounded-lg transition-all duration-200 hover:bg-task-hover group"
  >
    <div class="flex flex-col gap-2">
      <span class="text-xl capitalize">
        {{ item.title }}
      </span>
      <span
        class="text-sm transition-colors"
        [class.text-gray-200]="selectedTask()?.id === item.id"
        [class.text-gray-500]="selectedTask()?.id !== item.id"
        >{{ item.subTitle }}</span
      >
    </div>
  </button>
  <hr class="border-gray-300 my-2" />
}
